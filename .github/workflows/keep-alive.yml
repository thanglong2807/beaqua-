name: Keep Alive

on:
  schedule:
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render service
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://beaqua.onrender.com/api/san-phams?pagination[pageSize]=1)
          echo "Response status: $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
            echo "Service is alive"
          else
            echo "Service returned $STATUS"
          fi
